<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هوش مصنوعی فارسی</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Tahoma, sans-serif;
    direction: rtl;
  }
  .header {
    padding: 24px 20px 12px;
    text-align: center;
  }
  .header .icon { font-size: 40px; }
  .header h1 { color: #fff; margin: 8px 0 4px; font-size: 24px; }
  .header p { color: #a78bfa; font-size: 14px; }
  .chat {
    flex: 1;
    width: 100%;
    max-width: 700px;
    padding: 0 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }
  .empty {
    margin-top: 60px;
    text-align: center;
    color: #7c6fb0;
    font-size: 15px;
  }
  .empty .star { font-size: 48px; margin-bottom: 12px; }
  .msg { display: flex; }
  .msg.user { justify-content: flex-start; }
  .msg.bot { justify-content: flex-end; }
  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    color: #fff;
    font-size: 15px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    border-radius: 18px 18px 18px 4px;
    background: rgba(167,139,250,0.15);
    border: 1px solid rgba(167,139,250,0.3);
  }
  .msg.bot .bubble {
    border-radius: 18px 18px 4px 18px;
    background: linear-gradient(135deg, #6d28d9, #4f46e5);
  }
  .loading .bubble {
    color: #c4b5fd;
    font-size: 20px;
    letter-spacing: 4px;
  }
  .input-area {
    width: 100%;
    max-width: 700px;
    padding: 12px 16px 24px;
    display: flex;
    gap: 10px;
  }
  textarea {
    flex: 1;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid rgba(167,139,250,0.4);
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-size: 15px;
    resize: none;
    outline: none;
    font-family: Tahoma, sans-serif;
    direction: rtl;
  }
  textarea::placeholder { color: #7c6fb0; }
  button {
    padding: 0 22px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
  }
  button:disabled {
    background: rgba(109,40,217,0.3);
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div class="header">
  <div class="icon">🤖</div>
  <h1>هوش مصنوعی فارسی</h1>
  <p>هر چی بپرسی جواب میدم!</p>
</div>

<div class="chat" id="chat">
  <div class="empty" id="empty">
    <div class="star">✨</div>
    سلام! چطور می‌تونم کمکت کنم؟
  </div>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="پیامت رو بنویس..."></textarea>
  <button id="send" onclick="sendMessage()">➤</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const empty = document.getElementById('empty');
let messages = [];

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMsg(role, text) {
  if (empty) empty.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  div.innerHTML = '<div class="bubble">' + text + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  messages.push({ role: 'user', content: text });
  addMsg('user', text);
  const loading = addMsg('bot', '●●●');
  loading.classList.add('loading');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'تو یک دستیار هوشمند فارسی هستی. همیشه به فارسی جواب بده.',
        messages: messages
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'خطا!';
    messages.push({ role: 'assistant', content: reply });
    loading.querySelector('.bubble').textContent = reply;
    loading.classList.remove('loading');
  } catch {
    loading.querySelector('.bubble').textContent = '⚠️ خطا در اتصال';
    loading.classList.remove('loading');
  }
}
</script>
</body>
</html>
